name: Build MSI Installer

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install agent dependencies
        working-directory: ./agent
        run: npm install
        env:
          npm_config_msvs_version: '2022'

      - name: Generate config.json
        working-directory: ./agent
        shell: powershell
        run: |
          $config = @{
            dashboardUrl = "wss://v0-msi-remote-agent.vercel.app"
            reconnectInterval = 5000
          } | ConvertTo-Json
          $config | Out-File -FilePath "config.json" -Encoding utf8
          Write-Host "config.json generated:"
          Get-Content "config.json"

      - name: Cache nexe binaries
        uses: actions/cache@v3
        with:
          path: ~/.nexe
          key: ${{ runner.os }}-nexe-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-nexe-

      - name: Build agent executable
        working-directory: ./agent
        run: |
          mkdir -p dist
          npm run build
        shell: bash

      - name: Verify agent executable
        run: |
          if (Test-Path "./agent/dist/agent.exe") {
            Write-Host "Agent executable built successfully"
            Get-Item "./agent/dist/agent.exe" | Format-List
          } else {
            Write-Error "Agent executable not found!"
            exit 1
          }
        shell: powershell

      - name: Install installer dependencies
        working-directory: ./installer
        run: npm install

      - name: Import code signing certificate
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        run: |
          if ($env:CERTIFICATE_BASE64) {
            $certBytes = [Convert]::FromBase64String($env:CERTIFICATE_BASE64)
            $certPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
            [IO.File]::WriteAllBytes($certPath, $certBytes)
            echo "CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "Certificate imported successfully"
          } else {
            echo "No certificate provided, skipping code signing"
          }
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}

      - name: Build MSI
        working-directory: ./installer
        run: node build-msi.js
        env:
          CERT_PATH: ${{ env.CERT_PATH }}
          CERT_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: installer/output/*.msi
          retention-days: 30

      - name: Create Release (on tag)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: installer/output/*.msi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Setup Node.js
        if: always()
        shell: powershell
        run: |
          if (Test-Path "$env:RUNNER_TEMP\certificate.pfx") {
            Remove-Item "$env:RUNNER_TEMP\certificate.pfx" -Force
            echo "Certificate cleaned up"
          }
